<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Genzix Infinite Quiz</title>
<style>
  /* Bubblegum pop background with overlay */
  body {
    font-family: 'Comic Sans MS', cursive, sans-serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
   background:
  linear-gradient(135deg,rgba(255,182,193,.4),rgba(255,105,180,.4)),
  url("https://pbs.twimg.com/media/G_onNeObAAA8BAc?format=jpg&name=medium") center/80% no-repeat;
    background-size: cover;
    color: #fff;
  }

  h1 {
    text-align: center;
    font-size: 2.5em;
    color: #fff0f6;
    text-shadow: 2px 2px #ff5bbd;
    margin-bottom: 20px;
  }

  #game {
    background: rgba(255, 255, 255, 0.85);
    border-radius: 25px;
    padding: 30px;
    max-width: 500px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    color: #ff4fa1;
    text-align: center;
  }

  p {
    font-size: 1.3em;
    font-weight: bold;
    margin-bottom: 15px;
  }

  input {
    padding: 12px;
    width: 250px;
    font-size: 16px;
    border-radius: 25px;
    border: 2px solid #ff8bd4;
    outline: none;
    text-align: center;
  }

  button {
    padding: 12px 25px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 25px;
    background: linear-gradient(45deg, #ff8bd4, #ff5bbd);
    color: white;
    font-weight: bold;
    transition: 0.3s;
  }

  button:hover {
    background: linear-gradient(45deg, #ff5bbd, #ff8bd4);
    transform: scale(1.05);
  }

  #timer {
    font-size: 18px;
    margin: 10px 0;
    color: red;
    font-weight: bold;
  }

  #result {
    font-size: 20px;
    margin-top: 10px;
    font-weight: bold;
  }

  /* Popup styles */
  #popup {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition: 0.3s;
    z-index: 999;
  }

  #popup.show {
    opacity:1;
    pointer-events:auto;
  }

  #popupContent {
    background: #fff;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    max-width: 300px;
    animation: popin 0.3s ease;
  }

  #popupContent img {
    width: 180px;
    border-radius: 15px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
  }

  @keyframes popin {
    0% { transform: scale(0.7); opacity:0; }
    100% { transform: scale(1); opacity:1; }
  }
</style>
</head>
<body>
<div>
  <h1>🎶 Genzix Infinite Quiz 🎶</h1>
  <div id="game">
    <p id="lyricPrompt"></p>
    <input type="text" id="answer" placeholder="Type your answer...">
    <br>
    <button onclick="checkAnswer()">Submit</button>
    <div id="timer"></div>
    <div id="result"></div>
  </div>
</div>

<!-- Popup -->
<div id="popup">
  <div id="popupContent">
    <img id="popupImg" src="" alt="Result">
    <br>
    <button onclick="closePopupAndNext()">Next</button>
  </div>
</div>

<script>
const allQuestions = {
  easy: [
    {q:"Di na nga nag ____ kung ito ay isang pagibig", a:["nagtataka"]},
    {q:"Like dub dub oh dub ____", a:["dub"]},
    {q:"Unang kita pa lang kuhang ____ mo na", a:["kuha"]},
    {q:"Your face captivates me like a pretty ____", a:["melody"]},
    {q:"La, wala pang 5 ____ nang nahulog sayo", a:["seconds"]},
    {q:"Oops! So ____!", a:["clumsy"]},
    {q:"Handa akong ____ ang iyong sakdal", a:["harapin"]},
    {q:"Kung iniisip bakit ka laging ____", a:["masaya"]},
    {q:"Pssst. napalingon ka ____?", a:["yata"]},
    {q:"Hmm. Don't get ____", a:["me wrong"]}
  ],
  medium: [
    {q:"who in genzix member na fav line nya is 'hindi talagaa'?", a:["jayu","Jayu"]},
    {q:"sino ang my 40+ perfume?", a:["jayu","Jayu"]},
    {q:"Sino laging late sa genzix?", a:["leo","Leo"]},
    {q:"who's most likely to be mang huhula?", a:["leo","Leo"]},
    {q:"name ng teddy bear ni kiyo?", a:["sky","Sky"]},
    {q:"Sino yung admin ng genzix na 1 month lang loyal kay leo?", a:["angel","Angel"]}
  ],
  hard: [
    {q:"Sino nangungupit kay sir nadz?", a:["cantonz","kiyo, jayu","kupitz duo."]},
    {q:"sino nakaubos ng tortang talong?", a:["jayu","Jayu"]},
    {q:"Revi: something big na...", a:["vida drink","Vida drink"]},
    {q:"Mahal ni Leo ang soulz pero mas mahal nya si?", a:["jayu","Jayu"]},
    {q:"sino ang laging pinapagalitan ni sir nadz?", a:["aki","Aki"]},
    {q:"laging lutang?", a:["leo","Leo"]},
    {q:"Who said the line 'suntukin ko kayo'?", a:["kris","Kris"]},
    {q:"Bias ng lahat na soulz?", a:["angel","Angel"]},
    {q:"Sino si spiderman?", a:["leo","Leo"]},
    {q:"sino ang nakukupitan lagi?", a:["sir nadz","nadz","sir"]}
  ]
};

const goodPhotos = [
  "https://pbs.twimg.com/media/G0AVV1rbkAInkHb?format=jpg&name=small",
  "https://pbs.twimg.com/media/GzsCPaQbcAApS_w?format=jpg&name=large",
  "https://pbs.twimg.com/media/GeW2F5AbkAAAuQd?format=jpg&name=large"
];

const memePhotos = [
  "https://pbs.twimg.com/media/G0FydTqb0AASzxN?format=png&name=small",
  "https://pbs.twimg.com/media/G0FyivpbgAA_C5m?format=png&name=small",
  "https://pbs.twimg.com/media/G0FynrEbIAE6dIr?format=png&name=360x360"
];

let currentQuestion, timer;
let usedQuestions = {easy:[], medium:[], hard:[]};
let difficulty = "easy";

function getTimeLimit() {
  if(difficulty==="easy") return 10;
  if(difficulty==="medium") return 5;
  return 3;
}

function startTimer() {
  clearInterval(timer);
  let timeLeft = getTimeLimit();
  document.getElementById("timer").textContent = "⏳ " + timeLeft + "s left";
  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").textContent = "⏳ " + timeLeft + "s left";
    if(timeLeft<=0){
      clearInterval(timer);
      showResult(false,true);
    }
  },1000);
}

function nextQuestion(){
  document.getElementById("result").textContent = "";
  document.getElementById("answer").value = "";

  let pool = allQuestions[difficulty].filter(q => !usedQuestions[difficulty].includes(q.q));
  if(pool.length===0){
    usedQuestions[difficulty] = [];
    pool = [...allQuestions

	[difficulty]];
  }

  currentQuestion = pool[Math.floor(Math.random() * pool.length)];
  usedQuestions[difficulty].push(currentQuestion.q);

  document.getElementById("lyricPrompt").textContent = currentQuestion.q;
  startTimer();
}

function checkAnswer() {
  clearInterval(timer);
  const userAns = document.getElementById("answer").value.trim().toLowerCase();
  const correctAns = currentQuestion.a.map(a => a.toLowerCase());
  const isCorrect = correctAns.includes(userAns);
  showResult(isCorrect, false);
}

function showResult(correct, timeout) {
  let imgSrc, msg;
  if (correct) {
    msg = "💖 Correct!";
    imgSrc = goodPhotos[Math.floor(Math.random() * goodPhotos.length)];
  } else {
    msg = timeout ? `⏰ Time’s up! Correct: ${currentQuestion.a[0]}` : `❌ Wrong! Correct: ${currentQuestion.a[0]}`;
    imgSrc = memePhotos[Math.floor(Math.random() * memePhotos.length)];
  }
  document.getElementById("result").textContent = msg;

  // Show popup
  document.getElementById("popupImg").src = imgSrc;
  document.getElementById("popup").classList.add("show");
}

function closePopupAndNext() {
  document.getElementById("popup").classList.remove("show");
  nextQuestion();
}

// Start the first question
nextQuestion();
</script>
</body>
</html>
